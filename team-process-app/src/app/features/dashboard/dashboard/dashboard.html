<div class="p-6 h-full">
  <h2 class="text-2xl text-slate-900 flex justify-start font-bold py-6">Resumen de hoy</h2>
  <div class="grid grid-cols-4 gap-4">
    <div class="bg-white border border-slate-200 rounded-xl p-5">
      <p class="text-sm text-slate-500 mb-1">Total empleados</p>
      <p class="text-3xl font-medium text-indigo-600">{{ totalEmployees }}</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-xl p-5">
      <p class="text-sm text-slate-500 mb-1">Presentes</p>
      <p class="text-3xl font-medium text-green-600">{{ presents }}</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-xl p-5">
      <p class="text-sm text-slate-500 mb-1">Ausentes</p>
      <p class="text-3xl font-medium text-red-600">{{ absents }}</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-xl p-5">
      <p class="text-sm text-slate-500 mb-1">Ingresaron tarde</p>
      <p class="text-3xl font-medium text-amber-500">{{ late }}</p>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-slate-200 p-5 mt-6">
    <h3 class="text-sm text-slate-500 mb-4">Asistencia por mes</h3>
    <canvas #myChart></canvas>
  </div>
</div>
