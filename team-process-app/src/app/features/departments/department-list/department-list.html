<div class="p-6">
  <div class="flex justify-between items-center mb-6 border-slate-400 border-b py-3">
    <div>
      <h1 class="text-2xl font-medium text-slate-800">Departamentos</h1>
      <p class="text-sm text-slate-500">{{ departments.length }} departamentos registrados</p>
    </div>
    <div>
      <button
        (click)="openCreateModal()"
        class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700 transition-colors"
      >
        <lucide-icon [img]="Plus" size="16"></lucide-icon> Nuevo departamento
      </button>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
    <table class="w-full">
      <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
          <th class="text-left text-xs text-slate-400 font-medium px-4 py-3 w-10">#</th>
          <th class="text-left text-xs text-slate-400 font-medium px-4 py-3">Nombre</th>
          <th class="text-right text-xs text-slate-400 font-medium px-4 py-3 w-10">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (department of departments; track department.id) {
          <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
            <td class="px-4 py-3 text-sm text-slate-400">
              {{ department.id }}
            </td>
            <td class="px-4 py-3 text-sm text-slate-800 font-medium">
              {{ department.name }}
            </td>
            <td class="px-4 py-3">
              <div class="flex gap-2 justify-end">
                <button
                  (click)="openEditModal(department)"
                  class="p-2 rounded-lg bg-green-50 hover:bg-green-100 transition-colors"
                >
                  <lucide-icon [img]="Pencil" size="15" class="text-green-600"></lucide-icon>
                </button>
                <button
                  (click)="deleteDepartment(department.id)"
                  class="p-2 rounded-lg bg-red-50 hover:bg-red-100 transition-colors"
                >
                  <lucide-icon [img]="Trash2" size="15" class="text-red-600"></lucide-icon>
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
  @if (showModal) {
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
      <div class="bg-white rounded-xl p-6 w-full max-w-md">
        <h2 class="text-lg font-medium text-slate-800 mb-4">
          {{ selectedDepartment ? 'Editar departamento' : 'Nuevo departamento' }}
        </h2>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="mb-4">
            <label class="text-sm text-slate-600 block mb-1">Nombre</label>
            <input
              formControlName="name"
              type="text"
              class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-400"
              placeholder="Ej: Sistemas"
            />
          </div>
          <div class="flex gap-2 justify-end">
            <button
              type="button"
              (click)="showModal = false"
              class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg transition-colors"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors"
            >
              {{ selectedDepartment ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
